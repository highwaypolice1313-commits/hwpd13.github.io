<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>ระบบฐานข้อมูลรถวิทยุในสังกัด</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --emerald: #059669;
    --emerald-dark: #064e3b;
    --emerald-mid: #047857;
    --emerald-light: #34d399;
    --ink: #0f172a;
    --paper: #f8faf9;
  }
  *{ -webkit-tap-highlight-color: transparent; }
  body{
    font-family:'Prompt','IBM Plex Sans Thai',sans-serif;
    background:
      radial-gradient(circle at 10% 0%, #ecfdf5 0%, transparent 45%),
      radial-gradient(circle at 90% 100%, #f0fdfa 0%, transparent 45%),
      var(--paper);
    color: var(--ink);
  }
  #mobileApp{
    max-width: 480px; margin: 0 auto; min-height: 100vh; background:#fff;
    display:flex; flex-direction:column; box-shadow:0 0 50px rgba(4,30,20,.18);
    position:relative; overflow:hidden;
  }
  .app-header{
    background:linear-gradient(135deg,var(--emerald-light) 0%, var(--emerald) 45%, var(--emerald-dark) 100%);
    color:#fff; padding:18px 20px; position:sticky; top:0; z-index:30;
    box-shadow:0 6px 20px -6px rgba(4,77,47,.45);
  }
  .bottom-nav{
    position:sticky; bottom:0; left:0; right:0; background:rgba(255,255,255,.9);
    backdrop-filter: blur(14px) saturate(180%); -webkit-backdrop-filter: blur(14px) saturate(180%);
    border-top:1px solid rgba(0,0,0,.06); display:flex; z-index:30;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottom-nav button{
    flex:1; padding:11px 4px 9px; font-size:11.5px; font-weight:500;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    color:#94a3b8; background:transparent; border:none;
  }
  .bottom-nav button.active{ color:var(--emerald-mid); font-weight:700; }
  .bottom-nav button .ic{ font-size:21px; }
  .tab-panel{ display:none; flex:1; padding:18px; padding-bottom:28px; overflow-y:auto; }
  .tab-panel.active{ display:block; }
  .card{
    background:#fff; border:1px solid rgba(15,23,42,.06); border-radius:18px;
    padding:16px; box-shadow:0 4px 16px -6px rgba(15,23,42,.08);
  }
  input[type=text], input[type=password], .dropdown-input{
    width:100%; border:1.5px solid #e2e8f0; border-radius:12px;
    padding:11px 14px; font-size:14px; outline:none; background:#f8fafc;
  }
  input[type=text]:focus, input[type=password]:focus, .dropdown-input:focus{
    border-color:var(--emerald); background:#fff; box-shadow:0 0 0 4px rgba(5,150,105,.12);
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--emerald-light),var(--emerald) 55%,var(--emerald-dark));
    color:#fff; border-radius:14px; padding:13px; font-weight:700; font-size:14.5px;
    width:100%; border:none; box-shadow:0 10px 24px -8px rgba(5,150,105,.55);
  }
  .btn-primary:disabled{ opacity:.5; box-shadow:none; }
  .dropdown-list{
    position:absolute; z-index:50; background:#fff; border:1px solid #e2e8f0;
    border-radius:12px; max-height:190px; overflow-y:auto; width:100%;
    box-shadow:0 14px 32px -8px rgba(15,23,42,.18); margin-top:6px; display:none;
  }
  .dropdown-list div{ padding:10px 14px; font-size:14px; cursor:pointer; }
  .dropdown-list div:hover{ background:#ecfdf5; color:var(--emerald-mid); font-weight:600; }
  .badge{ display:inline-block; padding:3px 11px; border-radius:999px; font-size:11px; font-weight:700; }
  .spinner{
    border:3px solid #d1fae5; border-top:3px solid var(--emerald);
    border-radius:50%; width:22px; height:22px; animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg);} }
</style>
</head>
<body>

<div id="mobileApp">

  <div class="app-header flex items-center justify-between">
    <div>
      <div class="text-xs opacity-80">ระบบฐานข้อมูล</div>
      <div class="font-bold text-lg leading-tight">รถวิทยุในสังกัด 🚓</div>
    </div>
    <div id="userMiniBox" class="text-right text-xs opacity-90">
      <div id="userMiniName">กำลังโหลด...</div>
    </div>
  </div>

  <div id="tab-send" class="tab-panel active">
    <div class="card mb-3">
      <div class="flex items-center gap-3">
        <img id="userAvatar" src="https://api.dicebear.com/7.x/initials/svg?seed=U" class="w-11 h-11 rounded-full border-2 border-emerald-200" />
        <div>
          <div class="font-bold text-gray-800" id="userNameTxt">ผู้ใช้งาน</div>
          <div class="text-xs text-gray-400" id="userIdTxt">LINE ID: -</div>
        </div>
      </div>
    </div>

    <div class="card mb-3">
      <h2 class="font-bold text-emerald-800 mb-3 text-sm">📋 ข้อมูลป้ายทะเบียนรถ</h2>
      <label class="text-xs text-gray-500 font-semibold">หมวดอักษร</label>
      <input type="text" id="plateChar" placeholder="เช่น กข" class="mb-3 mt-1" />
      <label class="text-xs text-gray-500 font-semibold">หมวดตัวเลข</label>
      <input type="text" id="plateNumber" placeholder="เช่น 1234" inputmode="numeric" class="mb-3 mt-1" />
      <label class="text-xs text-gray-500 font-semibold">หมวดจังหวัด</label>
      <div class="relative mt-1 mb-1">
        <input type="text" id="plateProvince" class="dropdown-input" placeholder="พิมพ์เพื่อค้นหาจังหวัด..." autocomplete="off" />
        <div id="provinceDropdown" class="dropdown-list"></div>
      </div>
    </div>

    <div class="card mb-3">
      <h2 class="font-bold text-emerald-800 mb-3 text-sm">🎥 ไฟล์วิดีโอหลักฐาน</h2>
      <input type="file" id="videoFile" accept="video/*" class="text-sm w-full" />
      <div id="fileNameLabel" class="text-xs text-gray-400 mt-2"></div>
    </div>

    <button id="btnSubmit" class="btn-primary flex items-center justify-center gap-2">
      <span id="btnSubmitText">📤 ยืนยันส่งข้อมูล</span>
    </button>
    <div id="submitStatus" class="text-center text-xs mt-2 text-gray-500"></div>
  </div>

  <div id="tab-receipt" class="tab-panel">
    <div class="text-center mb-3">
      <h2 class="font-bold text-emerald-800">🧾 ใบหลักฐานภาพรายงาน</h2>
      <p class="text-xs text-gray-400">บันทึกภาพนี้เพื่อส่งต่อในกลุ่ม LINE</p>
    </div>
    <div class="flex justify-center">
      <canvas id="receiptCanvas" style="width:100%; max-width:380px; border-radius:10px;"></canvas>
    </div>
    <button id="btnDownloadImg" class="btn-primary mt-4">📥 ดาวน์โหลดรูปภาพหลักฐานลงเครื่อง</button>
    <button id="btnBackToForm" class="w-full mt-2 text-emerald-700 text-sm font-semibold py-2">⬅ กลับไปส่งรายงานใหม่</button>
  </div>

  <div id="tab-today" class="tab-panel">
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-bold text-emerald-800 text-sm">📅 รายงานวันนี้</h2>
      <button id="btnRefreshToday" class="text-xs text-emerald-600 font-semibold">🔄 รีเฟรช</button>
    </div>
    <div id="todayList" class="space-y-3"></div>
  </div>

  <div id="tab-search" class="tab-panel">
    <h2 class="font-bold text-emerald-800 mb-3 text-sm">🔍 ค้นหาป้ายทะเบียนย้อนหลัง</h2>
    <input type="text" id="searchInput" placeholder="พิมพ์ อักษร / เลข / จังหวัด..." class="mb-3" />
    <div id="searchList" class="space-y-3"></div>
  </div>

  <div id="adminLockScreen" class="absolute inset-0 bg-white z-40 hidden flex-col items-center justify-center p-8 text-center">
    <div class="text-4xl mb-3">🔒</div>
    <div class="font-bold text-gray-700 mb-3">กรุณากรอกรหัสผ่านแอดมิน</div>
    <input type="password" id="adminPassInput" class="text-center mb-3" placeholder="รหัสผ่าน" />
    <button id="btnAdminConfirm" class="btn-primary mb-2">เข้าสู่ระบบ</button>
    <button id="btnAdminCancel" class="text-xs text-gray-400">ยกเลิก</button>
    <div id="adminLockError" class="text-xs text-red-500 mt-2"></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" data-tab="tab-send">
      <span class="ic">🚗</span><span>ผู้ปฏิบัติ: ส่งคลิป</span>
    </button>
    <button class="nav-btn" data-tab="tab-today" data-admin="1">
      <span class="ic">📊</span><span>แอดมิน: รายงานวัน</span>
    </button>
    <button class="nav-btn" data-tab="tab-search" data-admin="1">
      <span class="ic">🔎</span><span>แอดมิน: ค้นหา</span>
    </button>
  </div>
</div>

<script>
/* ============================================================
   ⚠️ ตั้งค่าจำเป็น 2 ค่านี้ก่อนใช้งานจริง
   ============================================================ */
const LIFF_ID = "2010560666-vlJ3RPxK"; // LIFF ID จาก LINE Developers Console
const API_URL = "https://script.google.com/macros/s/XXXXXXXXXXXXXXXX/exec"; // Web App URL ของ code.gs (ลงท้ายด้วย /exec)

/* ============================================================
   CONFIG & STATE
   ============================================================ */
const PROVINCES = ["ลพบุรี","กรุงเทพฯ","สระบุรี","สิงห์บุรี","อยุธยา","อ่างทอง","ชัยนาท","นนทบุรี","ปทุมธานี",
"นครปฐม","สมุทรปราการ","สมุทรสาคร","สมุทรสงคราม","ราชบุรี","กาญจนบุรี","สุพรรณบุรี","นครนายก","ฉะเชิงเทรา",
"ปราจีนบุรี","สระแก้ว","ชลบุรี","ระยอง","จันทบุรี","ตราด","นครราชสีมา","บุรีรัมย์","สุรินทร์","ศรีสะเกษ",
"อุบลราชธานี","ขอนแก่น","อุดรธานี","เลย","หนองคาย","มหาสารคาม","ร้อยเอ็ด","กาฬสินธุ์","สกลนคร","นครพนม",
"เชียงใหม่","เชียงราย","ลำปาง","ลำพูน","แพร่","น่าน","พะเยา","แม่ฮ่องสอน","ตาก","สุโขทัย","พิษณุโลก",
"พิจิตร","กำแพงเพชร","นครสวรรค์","อุทัยธานี","เพชรบูรณ์","ภูเก็ต","สุราษฎร์ธานี","นครศรีธรรมราช","สงขลา",
"กระบี่","พังงา","ตรัง","สตูล","ยะลา","ปัตตานี","นราธิวาส","ระนอง","ชุมพร","พัทลุง"];

let CURRENT_USER = { userId: "-", displayName: "ผู้ใช้งาน", pictureUrl: "" };
let IS_ADMIN_UNLOCKED = false;
let PENDING_ADMIN_TAB = null;
let LAST_REPORT_DATA = null;
let SELECTED_FILE_BASE64 = null;
let SELECTED_FILE_OBJ = null;

/* ============================================================
   LIFF INIT — มี timeout กันค้าง + ไม่บังคับ login
   ============================================================ */
async function initLiff() {
  try {
    if (typeof liff === "undefined") throw new Error("ไม่พบ LIFF SDK");

    const initPromise = liff.init({ liffId: LIFF_ID });
    const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error("liff.init timeout")), 6000));
    await Promise.race([initPromise, timeout]);

    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      CURRENT_USER = {
        userId: profile.userId,
        displayName: profile.displayName,
        pictureUrl: profile.pictureUrl || ""
      };
    } else if (liff.isInClient()) {
      // อยู่ในแอป LINE จริงแต่ยังไม่ login -> ส่งไป login แล้ว redirect กลับมาเอง
      liff.login({ redirectUri: window.location.href });
      return;
    } else {
      console.warn("เปิดนอกแอป LINE — ไม่สามารถดึงโปรไฟล์ LINE ได้");
    }
  } catch (err) {
    console.warn("[LIFF] " + err.message);
  } finally {
    renderUserProfile();
  }
}

function renderUserProfile() {
  document.getElementById("userNameTxt").innerText = CURRENT_USER.displayName;
  document.getElementById("userIdTxt").innerText = "LINE ID: " + CURRENT_USER.userId;
  document.getElementById("userMiniName").innerText = CURRENT_USER.displayName;
  const avatar = document.getElementById("userAvatar");
  avatar.src = CURRENT_USER.pictureUrl ||
    ("https://api.dicebear.com/7.x/initials/svg?seed=" + encodeURIComponent(CURRENT_USER.displayName));
}

/* ============================================================
   เรียก Backend ผ่าน fetch() แทน google.script.run
   ============================================================ */
async function apiPost(action, data) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // กัน CORS preflight
    body: JSON.stringify({ action, data })
  });
  return res.json();
}

async function apiGet(action, params) {
  const url = new URL(API_URL);
  url.searchParams.set("action", action);
  Object.entries(params || {}).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  return res.json();
}

/* ============================================================
   PROVINCE SEARCHABLE DROPDOWN
   ============================================================ */
function setupProvinceDropdown() {
  const input = document.getElementById("plateProvince");
  const list = document.getElementById("provinceDropdown");
  function renderList(filter) {
    const f = (filter || "").trim();
    const matched = f ? PROVINCES.filter(p => p.includes(f)) : PROVINCES;
    list.innerHTML = "";
    if (matched.length === 0) { list.style.display = "none"; return; }
    matched.slice(0, 20).forEach(p => {
      const div = document.createElement("div");
      div.innerText = p;
      div.onclick = () => { input.value = p; list.style.display = "none"; };
      list.appendChild(div);
    });
    list.style.display = "block";
  }
  input.addEventListener("focus", () => renderList(input.value));
  input.addEventListener("input", () => renderList(input.value));
  document.addEventListener("click", (e) => {
    if (!list.contains(e.target) && e.target !== input) list.style.display = "none";
  });
}

/* ============================================================
   TAB NAVIGATION
   ============================================================ */
function setupBottomNav() {
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const tabId = btn.dataset.tab;
      const needsAdmin = btn.dataset.admin === "1";
      if (needsAdmin && !IS_ADMIN_UNLOCKED) {
        PENDING_ADMIN_TAB = tabId;
        document.getElementById("adminLockScreen").classList.remove("hidden");
        document.getElementById("adminLockScreen").classList.add("flex");
        return;
      }
      switchTab(tabId);
    });
  });
}

function switchTab(tabId) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tabId));
  if (tabId === "tab-today") loadTodayData();
  if (tabId === "tab-search") document.getElementById("searchList").innerHTML = "";
}

function setupAdminLock() {
  document.getElementById("btnAdminConfirm").onclick = async () => {
    const pass = document.getElementById("adminPassInput").value;
    document.getElementById("adminLockError").innerText = "";
    const result = await apiGet("checkAdminPass", { pass });
    if (result.valid === true) {
      IS_ADMIN_UNLOCKED = true;
      document.getElementById("adminLockScreen").classList.add("hidden");
      document.getElementById("adminLockScreen").classList.remove("flex");
      document.getElementById("adminPassInput").value = "";
      if (PENDING_ADMIN_TAB) switchTab(PENDING_ADMIN_TAB);
    } else {
      document.getElementById("adminLockError").innerText = "❌ รหัสผ่านไม่ถูกต้อง";
    }
  };
  document.getElementById("btnAdminCancel").onclick = () => {
    document.getElementById("adminLockScreen").classList.add("hidden");
    document.getElementById("adminLockScreen").classList.remove("flex");
  };
}

/* ============================================================
   ฟอร์มส่งคลิป
   ============================================================ */
function setupUploadForm() {
  document.getElementById("videoFile").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    SELECTED_FILE_OBJ = file;
    document.getElementById("fileNameLabel").innerText = "📎 " + file.name + " (" + (file.size/1024/1024).toFixed(2) + " MB)";
    const reader = new FileReader();
    reader.onload = () => { SELECTED_FILE_BASE64 = reader.result.split(",")[1]; };
    reader.readAsDataURL(file);
  });

  document.getElementById("btnSubmit").addEventListener("click", async () => {
    const plateChar = document.getElementById("plateChar").value.trim();
    const plateNumber = document.getElementById("plateNumber").value.trim();
    const plateProvince = document.getElementById("plateProvince").value.trim();
    const statusEl = document.getElementById("submitStatus");

    if (!plateChar || !plateNumber || !plateProvince) {
      statusEl.innerText = "⚠️ กรุณากรอกข้อมูลทะเบียนรถให้ครบถ้วน"; statusEl.className="text-center text-xs mt-2 text-red-500"; return;
    }
    if (!SELECTED_FILE_OBJ || !SELECTED_FILE_BASE64) {
      statusEl.innerText = "⚠️ กรุณาเลือกไฟล์วิดีโอ"; statusEl.className="text-center text-xs mt-2 text-red-500"; return;
    }

    const btn = document.getElementById("btnSubmit");
    btn.disabled = true;
    document.getElementById("btnSubmitText").innerHTML = '<span class="spinner inline-block align-middle"></span> กำลังอัปโหลด...';
    statusEl.innerText = "";

    try {
      const payload = {
        lineUserId: CURRENT_USER.userId,
        lineName: CURRENT_USER.displayName,
        plateChar, plateNumber, plateProvince,
        fileName: SELECTED_FILE_OBJ.name,
        mimeType: SELECTED_FILE_OBJ.type || "video/mp4",
        base64Data: SELECTED_FILE_BASE64
      };
      const result = await apiPost("uploadVideoReport", payload);

      if (result && result.success) {
        LAST_REPORT_DATA = { ...payload, ...result };
        drawReceiptCanvas(LAST_REPORT_DATA);
        switchTab("tab-receipt");
        resetForm();
      } else {
        statusEl.innerText = "❌ เกิดข้อผิดพลาด: " + (result.message || "ไม่ทราบสาเหตุ");
        statusEl.className = "text-center text-xs mt-2 text-red-500";
      }
    } catch (err) {
      statusEl.innerText = "❌ เกิดข้อผิดพลาด: " + err.message;
      statusEl.className = "text-center text-xs mt-2 text-red-500";
    } finally {
      btn.disabled = false;
      document.getElementById("btnSubmitText").innerText = "📤 ยืนยันส่งข้อมูล";
    }
  });

  document.getElementById("btnBackToForm").addEventListener("click", () => switchTab("tab-send"));
}

function resetForm() {
  document.getElementById("plateChar").value = "";
  document.getElementById("plateNumber").value = "";
  document.getElementById("plateProvince").value = "";
  document.getElementById("videoFile").value = "";
  document.getElementById("fileNameLabel").innerText = "";
  SELECTED_FILE_BASE64 = null;
  SELECTED_FILE_OBJ = null;
}

/* ============================================================
   CANVAS: ใบหลักฐานภาพ
   ============================================================ */
function drawReceiptCanvas(data) {
  const canvas = document.getElementById("receiptCanvas");
  const dpr = window.devicePixelRatio || 1;
  const W = 500, H = 620;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);

  ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = "#047857"; ctx.lineWidth = 6; ctx.strokeRect(8, 8, W-16, H-16);
  ctx.strokeStyle = "#10b981"; ctx.lineWidth = 1.5; ctx.strokeRect(16, 16, W-32, H-32);

  ctx.save();
  ctx.globalAlpha = 0.07; ctx.fillStyle = "#047857"; ctx.font = "bold 80px Arial";
  ctx.translate(W/2, H/2); ctx.rotate(-Math.PI/8); ctx.textAlign = "center";
  ctx.fillText("UPLOADED", 0, 0);
  ctx.restore();

  const grad = ctx.createLinearGradient(0,0,W,0);
  grad.addColorStop(0, "#047857"); grad.addColorStop(1, "#065f46");
  ctx.fillStyle = grad; ctx.fillRect(20, 30, W-40, 64);

  ctx.fillStyle = "#ffffff"; ctx.textAlign = "center"; ctx.font = "bold 20px Arial";
  ctx.fillText("ใบรับรองหลักฐานการรายงาน", W/2, 60);
  ctx.font = "13px Arial"; ctx.fillText("ระบบฐานข้อมูลรถวิทยุในสังกัด", W/2, 80);

  ctx.fillStyle = "#374151"; ctx.font = "13px Arial"; ctx.textAlign = "left";
  ctx.fillText("🕒 เวลาที่รายงาน: " + (data.timestamp || ""), 32, 128);

  ctx.font = "bold 14px Arial"; ctx.fillStyle = "#047857";
  ctx.fillText("👤 ข้อมูลผู้รายงาน", 32, 160);
  ctx.font = "13px Arial"; ctx.fillStyle = "#111827";
  ctx.fillText("ชื่อ: " + (data.lineName || "-"), 32, 182);
  ctx.fillStyle = "#6b7280"; ctx.font = "11px Arial";
  ctx.fillText("LINE ID: " + (data.lineUserId || "-"), 32, 200);

  ctx.fillStyle = "#ecfdf5"; roundRect(ctx, 32, 224, W-64, 140, 14); ctx.fill();
  ctx.strokeStyle = "#10b981"; ctx.lineWidth = 1.5; roundRect(ctx, 32, 224, W-64, 140, 14); ctx.stroke();

  ctx.fillStyle = "#047857"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center";
  ctx.fillText("🚗 ข้อมูลป้ายทะเบียนรถ", W/2, 250);

  ctx.font = "bold 30px Arial"; ctx.fillStyle = "#065f46";
  ctx.fillText((data.plateChar || "") + "  " + (data.plateNumber || ""), W/2, 300);

  ctx.font = "bold 18px Arial"; ctx.fillStyle = "#047857";
  ctx.fillText(data.plateProvince || "-", W/2, 335);

  ctx.textAlign = "left"; ctx.font = "bold 13px Arial"; ctx.fillStyle = "#047857";
  ctx.fillText("📁 ไฟล์หลักฐาน", 32, 400);
  ctx.font = "12px Arial"; ctx.fillStyle = "#374151";
  wrapText(ctx, data.fileName || "-", 32, 420, W-64, 16);

  ctx.strokeStyle = "#e5e7eb"; ctx.beginPath(); ctx.moveTo(32, 470); ctx.lineTo(W-32, 470); ctx.stroke();

  ctx.textAlign = "center"; ctx.font = "11px Arial"; ctx.fillStyle = "#9ca3af";
  ctx.fillText("เอกสารนี้สร้างขึ้นโดยอัตโนมัติจากระบบฐานข้อมูลรถวิทยุในสังกัด", W/2, H-40);
  ctx.font = "bold 12px Arial"; ctx.fillStyle = "#10b981";
  ctx.fillText("✔ บันทึกข้อมูลสำเร็จ", W/2, H-20);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split("");
  let line = "", curY = y;
  for (let i = 0; i < words.length; i++) {
    const testLine = line + words[i];
    if (ctx.measureText(testLine).width > maxWidth && line !== "") {
      ctx.fillText(line, x, curY); line = words[i]; curY += lineHeight;
    } else { line = testLine; }
  }
  ctx.fillText(line, x, curY);
}

async function loadTodayData() {
  const container = document.getElementById("todayList");
  container.innerHTML = '<div class="text-center text-gray-400 text-sm py-6"><span class="spinner inline-block"></span> กำลังโหลด...</div>';

  renderItemCards(container, data.items || []);
}

document.getElementById("searchInput")?.addEventListener("input", debounce(async (e) => {
  const kw = e.target.value;
  const container = document.getElementById("searchList");
  const data = await apiGet("searchPlate", { keyword: kw });
  renderItemCards(container, data.items || []);
}, 400));

function renderItemCards(container, items) {
  if (!items.length) {
    container.innerHTML = '<div class="text-center text-gray-400 text-sm py-6">ไม่พบข้อมูล</div>';
    return;
  }
  container.innerHTML = items.map(it => `
    <div class="card">
      <div class="flex justify-between items-start mb-2">
        <div>
          <span class="badge bg-emerald-100 text-emerald-700">${it.plateChar} ${it.plateNumber}</span>
          <span class="badge bg-gray-100 text-gray-600 ml-1">${it.plateProvince}</span>
        </div>
        <div class="text-xs text-gray-400">${formatTimeShort(it.timestamp)}</div>
      </div>
      <div class="text-sm text-gray-700">👤 ${it.lineName || "-"}</div>
      <div class="text-xs text-gray-400 mb-2">📁 ${it.fileName || "-"}</div>
      <a href="${it.fileUrl}" target="_blank" class="text-xs font-semibold text-emerald-600">▶ เปิดดูไฟล์บน Drive</a>
    </div>
  `).join("");
}

function formatTimeShort(ts) {
  try { return new Date(ts).toLocaleString("th-TH"); } catch(e) { return ts; }
}

function debounce(fn, wait) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
}
